name: Sync Videos

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run synchronization script
        shell: pwsh
        run: |
          ./sync-videos.ps1 -MaxPages 5
          
      - name: Check if database changed
        id: git-check
        run: |
          git diff --quiet videos.json || echo "changes=true" >> $GITHUB_OUTPUT
          
      - name: Commit and Push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git commit -m "System: Auto-synced latest episodes from source"
          git push
